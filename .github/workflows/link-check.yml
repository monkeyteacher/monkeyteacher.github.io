name: Link Check

# Runs every Monday at 00:00 UTC, or manually via GitHub UI
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  link-check:
    name: Check for broken links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --accept '200,301,302,403' 'src/data/blog/**/*.md'
          fail: true  # fail the job if broken links are found
